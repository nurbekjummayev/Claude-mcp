[program:ai-mcp-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/ai-mcp/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --timeout=600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/ai-mcp-worker.log
stopwaitsecs=3600
